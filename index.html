    <style>
        /* Estilos para manter a "Aura" do teu painel caso demore a carregar */
        body {
            background-color: #0f1014;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid #1a1b20;
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        .btn {
            color: #00d4ff;
            text-decoration: none;
            font-weight: bold;
            margin-top: 25px;
            padding: 12px 24px;
            background: #1a1b20;
            border-radius: 8px;
            border: 1px solid #2a2b30;
            transition: 0.2s;
            display: inline-block;
        }
        .btn:hover {
            background: #00d4ff;
            color: #000;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    
    <h2>A ligar aos servidores... ⚡</h2>
    <p style="color: #888888;">Vais ser redirecionado num instante.</p>
